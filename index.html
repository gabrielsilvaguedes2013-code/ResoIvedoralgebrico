<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resolvedor Algébrico 2.0</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.card{
    background:white;
    width:100%;
    max-width:700px;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#2a5298;
}

input{
    width:100%;
    padding:15px;
    margin:10px 0;
    border:2px solid #ddd;
    border-radius:10px;
    font-size:18px;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#2a5298;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#1e3c72;
}

.resultado{
    margin-top:20px;
    padding:15px;
    background:#f5f5f5;
    border-radius:10px;
    font-size:20px;
    font-weight:bold;
}

.historico{
    margin-top:20px;
}

.item{
    padding:10px;
    background:#eef3ff;
    border-radius:8px;
    margin-top:8px;
}
</style>
</head>

<body>

<div class="card">

<h1>🧠 Resolvedor Algébrico 2.0</h1>

<input
id="expressao"
placeholder="Ex: 2*x+3"
/>

<input
id="valorX"
type="number"
placeholder="Valor de x"
/>

<button onclick="resolver()">
Resolver
</button>

<div class="resultado" id="resultado">
Aguardando cálculo...
</div>

<div class="historico">
<h2>📜 Histórico</h2>
<div id="listaHistorico"></div>
</div>

</div>

<script>

let historico=[];

function resolver(){

    let expr =
    document.getElementById("expressao").value;

    let x =
    Number(document.getElementById("valorX").value);

    try{

        let f =
        new Function(
            "x",
            "return " + expr
        );

        let resultado=f(x);

        document.getElementById("resultado")
        .innerHTML=
        "✅ Resultado: " + resultado;

        historico.unshift(
        `${expr} com x=${x} → ${resultado}`
        );

        atualizarHistorico();

    }catch{

        document.getElementById("resultado")
        .innerHTML=
        "❌ Expressão inválida";

    }

}

function atualizarHistorico(){

    let lista=
    document.getElementById(
    "listaHistorico"
    );

    lista.innerHTML="";

    historico.slice(0,10)
    .forEach(item=>{

        lista.innerHTML+=
        `<div class="item">${item}</div>`;

    });

}

</script>

</body>
</html>
